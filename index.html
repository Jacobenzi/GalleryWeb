<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galerie obrazů</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>Galerie #PLACEHOLDER</h1>
<p>Aktuální nabídka obrazů k prodeji</p>
<div class="filters">

<button onclick="filterSelection('all')">Vše</button>
<button onclick="filterSelection('portrety')">Portréty</button>
<button onclick="filterSelection('krajiny')">Krajiny</button>
<button onclick="filterSelection('abstrakt')">Abstrakce</button>
<button onclick="filterSelection('studie')">Studie</button>

</div>
</header>

<section class="gallery">

<div class="painting">
<img src="images/obraz1.jpeg">
<h3>Mona Lisa</h3>
<p>Akryl na plátně</p>
<p class="price">4 500 Kč</p>
<button>Kontaktovat</button>
</div>

<div class="painting">
<img src="images/obraz2.jpeg">
<h3>Výkřik</h3>
<p>Olej na plátně</p>
<p class="price">6 000 Kč</p>
<button>Kontaktovat</button>
</div>

<div class="painting">
<img src="images/obraz3.jpeg">
<h3>Hvězdná obloha</h3>
<p>Akryl na plátně</p>
<p class="price">3 900 Kč</p>
<button>Kontaktovat</button>
</div>

</section>

<footer>
<p>Kontakt: email@email.cz</p>
</footer>

</body>
</html>
